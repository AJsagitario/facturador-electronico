version: "3.8"

services:
  db:
    image: postgres:15-alpine
    # RECOMENDADO: no fijar container_name (evita choques entre proyectos)
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: facturador
    # ✅ No choca con tu GoVision (que ya usa 5433:5432)
    ports:
      - "5434:5432"
    volumes:
      - facturador_postgres_data:/var/lib/postgresql/data
    networks:
      - facturador-network

  tax-service:
    build: ./tax-service
    volumes:
      - ./tax-service:/var/www/html
      - /var/www/html/vendor
    networks:
      - facturador-network

  api-core:
    build: ./api-core
    # ✅ No uses 3000 en el HOST. Usa uno libre (ej: 3006)
    ports:
      - "3006:3000"
    volumes:
      - ./api-core:/app
      - /app/node_modules
      - ./facturas-generadas:/app/facturas-generadas
    environment:
      - DB_HOST=db
      - TAX_SERVICE_URL=http://tax-service
    depends_on:
      - db
      - tax-service
    networks:
      - facturador-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-app
    restart: always
    ports:
      - "3010:3000" # 
    depends_on:
      - api-core
    networks:
      - facturador-network

volumes:
  facturador_postgres_data:

networks:
  facturador-network:
    driver: bridge
